name:

on:
  push:
    branches:
      - "main"

jobs:
  quality-sonarqube:
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    env:
      SERVER_PORT: 8080
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: grotrack
      DB_USERNAME: root
      DB_PASSWORD: 123456
      JWT_VALIDITY: 3600000
      JWT_SECRET: "RXhpc3RlIHVtYSB0ZW9yaWEgcXVlIGRpeiBxdWUsIHNlIHVtIGRpYSBhbGd16W0gZGVzY29icmlyIGV4YXRhbWVudGUgcGFyYSBxdW..."

    services:
      mysql:
        image: gabrielpacificooo/grotrack:database
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: grotrack
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Validar Configuração SonarQube
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          echo "Validando configuração SonarQube..."
          if [ -z "$SONAR_TOKEN" ]; then
            echo "    SONAR_TOKEN não configurado!"
            echo "    Por favor, adicione ao GitHub Secrets"
            exit 1
          fi
          echo "✓ SONAR_TOKEN configurado"
          echo "✓ Organização: grotrack"
          echo "✓ Projeto: grotrack_back-end"

      - name: Compilar projeto
        run: mvn clean compile

      - name: Executar SonarQube Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: false
        run: >
          mvn sonar:sonar 
          -Dsonar.projectKey=Projeto-de-extencao-Grupo-3_back-end 
          -Dsonar.organization=grotrack 
          -Dsonar.host.url=https://sonarcloud.io 
          -Dsonar.login=$SONAR_TOKEN 
          -Dsonar.sources=src/main/java 
          -Dsonar.tests=src/test/java

      - name: 📝 Resumo do SonarQube
        if: always()
        run: |
          echo "## 📊 Qualidade de Código (SonarCloud)" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == 'success' ]; then
            echo "✅ **Sucesso:** A análise de qualidade estática foi concluída e enviada." >> $GITHUB_STEP_SUMMARY
            echo "🔗 [Clique aqui para acessar o Dashboard do SonarCloud](https://sonarcloud.io/dashboard?id=Projeto-de-extencao-Grupo-3_back-end) e verificar as métricas do backend." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Falha:** Não foi possível enviar os dados de análise para o SonarCloud." >> $GITHUB_STEP_SUMMARY
          fi

  build-push-docker-image:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: gabrielpacificooo/grotrack:${{ secrets.DOCKERHUB_IMAGE_TAG}}

      - name: Exibir resumo de Sucesso
        if: success()
        run: |
          echo "### ✅ Build e Push Concluídos!" >> $GITHUB_STEP_SUMMARY
          echo "A imagem Docker do GROTrack (\`gabrielpacificooo/grotrack:${{ secrets.DOCKERHUB_IMAGE_TAG}}\`) foi gerada e enviada com sucesso para o Docker Hub." >> $GITHUB_STEP_SUMMARY

      - name: Exibir resumo de Falha
        if: failure()
        run: |
          echo "### ❌ Falha no Build ou Push" >> $GITHUB_STEP_SUMMARY
          echo "Não foi possível gerar ou enviar a imagem Docker. Verifique os logs do passo **Build and push** para entender o que quebrou." >> $GITHUB_STEP_SUMMARY