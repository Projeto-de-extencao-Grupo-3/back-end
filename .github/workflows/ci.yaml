name: Build & Test (OWASP Segurança & Qualidade)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    env:
      SERVER_PORT: 8080
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: grotrack
      DB_USERNAME: root
      DB_PASSWORD: 123456
      JWT_VALIDITY: 3600000
      JWT_SECRET: "RXhpc3RlIHVtYSB0ZW9yaWEgcXVlIGRpeiBxdWUsIHNlIHVtIGRpYSBhbGd16W0gZGVzY29icmlyIGV4YXRhbWVudGUgcGFyYSBxdW..."

    services:
      mysql:
        image: gabrielpacificooo/grotrack:database
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: grotrack
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build e Testes com Maven (JaCoCo)
        run: |
          echo "Compilando projeto..."
          mvn clean compile
          
          echo "Executando testes..."
          mvn verify -DskipTests=false || {
            echo "❌ Build ou testes falharam!"
            exit 1
          }
          
          echo "✅ Build e testes concluídos com sucesso"

      - name: Upload do Relatório de Cobertura JaCoCo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

      - name: Resumo de Build e Testes
        if: always()
        run: |
          echo "## Build & Testes (JaCoCo)" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == 'success' ]; then
            echo "✅ **Sucesso:** O código foi compilado e todos os testes passaram perfeitamente." >> $GITHUB_STEP_SUMMARY
            echo "📊 *Relatório de cobertura (JaCoCo) disponível nos artefatos.*" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Falha:** Houve um erro de compilação ou alguns testes falharam." >> $GITHUB_STEP_SUMMARY
            echo "⚠️ *Verifique os logs do step de Build para identificar a causa.*" >> $GITHUB_STEP_SUMMARY
          fi

  quality-sonarqube:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    env:
      SERVER_PORT: 8080
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: grotrack
      DB_USERNAME: root
      DB_PASSWORD: 123456
      JWT_VALIDITY: 3600000
      JWT_SECRET: "RXhpc3RlIHVtYSB0ZW9yaWEgcXVlIGRpeiBxdWUsIHNlIHVtIGRpYSBhbGd16W0gZGVzY29icmlyIGV4YXRhbWVudGUgcGFyYSBxdW..."

    services:
      mysql:
        image: gabrielpacificooo/grotrack:database
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: grotrack
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Validar Configuração SonarQube
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          echo "Validando configuração SonarQube..."
          if [ -z "$SONAR_TOKEN" ]; then
            echo "    SONAR_TOKEN não configurado!"
            echo "    Por favor, adicione ao GitHub Secrets"
            exit 1
          fi
          echo "✓ SONAR_TOKEN configurado"
          echo "✓ Organização: grotrack"
          echo "✓ Projeto: grotrack_back-end"

      - name: Compilar projeto
        run: mvn clean compile

      - name: Executar SonarQube Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: false
        run: >
          mvn sonar:sonar 
          -Dsonar.projectKey=Projeto-de-extencao-Grupo-3_back-end 
          -Dsonar.organization=grotrack 
          -Dsonar.host.url=https://sonarcloud.io 
          -Dsonar.login=$SONAR_TOKEN 
          -Dsonar.sources=src/main/java 
          -Dsonar.tests=src/test/java

      - name: 📝 Resumo do SonarQube
        if: always()
        run: |
          echo "## 📊 Qualidade de Código (SonarCloud)" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == 'success' ]; then
            echo "✅ **Sucesso:** A análise de qualidade estática foi concluída e enviada." >> $GITHUB_STEP_SUMMARY
            echo "🔗 [Clique aqui para acessar o Dashboard do SonarCloud](https://sonarcloud.io/dashboard?id=Projeto-de-extencao-Grupo-3_back-end) e verificar as métricas do backend." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Falha:** Não foi possível enviar os dados de análise para o SonarCloud." >> $GITHUB_STEP_SUMMARY
          fi