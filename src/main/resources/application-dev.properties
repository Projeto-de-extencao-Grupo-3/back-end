# ===== SERVER =====
server.port=${SERVER_PORT:8080}

# ===== JWT =====
jwt.validity=${JWT_VALIDITY:86400}
jwt.secret=${JWT_SECRET:dev-secret-key-change-in-production}

# ===== EXTERNAL SERVICES =====
plate.model.url=${URL_PYTHON:http://localhost:5000}
# Multiple frontend URLs separated by comma
url.frontend=${URL_FRONTEND:http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000}

# ===== DATABASE =====
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/grotrack}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ===== RABBITMQ =====
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:admin}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:admin}
spring.rabbitmq.virtual-host=${SPRING_RABBITMQ_VHOST:/}

# ===== AWS S3 =====
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:grotrack-bucket}
aws.s3.access-key=${AWS_ACCESS_KEY_ID:test}
aws.s3.secret-key=${AWS_SECRET_ACCESS_KEY:test}
aws.s3.region=${AWS_REGION:us-east-1}
aws.s3.session-token=${AWS_SESSION_TOKEN:}
aws.s3.endpoint-url=${AWS_ENDPOINT_URL:http://127.0.0.1:4566}